<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-blue-700 mb-4">Admin Dashboard</h1>

<a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded">Logout</a>

<!-- Complaints -->
<div class="mt-6 bg-white p-4 rounded shadow">
  <h2 class="text-xl font-semibold mb-3">Complaints</h2>
  {% for c in complaints %}
    <p class="border-b py-2">{{ c[1] }} - {{ c[2] }}</p>
  {% endfor %}
</div>

<!-- Queries -->
<div class="mt-6 bg-white p-4 rounded shadow">
  <h2 class="text-xl font-semibold mb-3">Queries</h2>
  {% for q in queries %}
    <p class="border-b py-2">{{ q[1] }} - {{ q[2] }}</p>
  {% endfor %}
</div>

<!-- Observations -->
<div class="mt-6 bg-white p-4 rounded shadow">
  <h2 class="text-xl font-semibold mb-3">Observations</h2>
  {% for o in observations %}
    <p class="border-b py-2">{{ o[1] }}</p>
  {% endfor %}
</div>

</body>
</html>

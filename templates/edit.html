<!DOCTYPE html>
<html>
<head>
<title>Edit Beat Book</title>
</head>

<body>

<h2>Edit Village Info</h2>

<form action="/update/{{ row[0] }}" method="POST">

<input type="text" name="police_station" value="{{ row[1] }}"><br><br>
<input type="text" name="village" value="{{ row[2] }}"><br><br>
<input type="text" name="beat_officer" value="{{ row[3] }}"><br><br>
<input type="text" name="beat_constable" value="{{ row[4] }}"><br><br>
<input type="text" name="population" value="{{ row[5] }}"><br><br>
<input type="text" name="caste" value="{{ row[6] }}"><br><br>
<input type="text" name="sarpanch" value="{{ row[7] }}"><br><br>
<input type="text" name="school" value="{{ row[8] }}"><br><br>

<button type="submit">Update</button>

</form>

</body>
</html>

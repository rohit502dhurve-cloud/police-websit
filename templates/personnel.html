<!DOCTYPE html>
<html>
<head>
    <title>Personnel Management</title>

    <!-- ✅ YAHAN CSS ADD KIYA HAI -->
    <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    h2 {
        color: #2c3e50;
    }

    .card {
        background: white;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input, select {
        padding: 8px;
        margin: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 8px 15px;
        border: none;
        background: #3498db;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #2980b9;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    table th {
        background: #3498db;
        color: white;
        padding: 10px;
        text-align: center;
    }

    table td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;  
    }

    table tr:hover {
        background: #f1f1f1;
    }
    </style>

</head>

<body>

<div class="card">
    <h2>🔍 Filter Personnel</h2>

    <form method="GET">
        <input type="text" name="search" placeholder="Search Name">

        <select name="rank">
            <option value="">All Rank</option>
            <option value="SI">SI</option>
            <option value="ASI">ASI</option>
            <option value="HC">HC</option>
            <option value="Constable">Constable</option>
        </select>

        <input type="text" name="ps" placeholder="Police Station">

        <button type="submit">Filter</button>
    </form>
</div>

<div class="card">
    <h2>📋 Personnel List</h2>

    <table>
        <tr>
            <th>Sr_no</th>
            <th>Ps_Outpost</th>
            <th>Rank</th>
            <th>Name</th>
            <th>Posting_Date</th>
            <th>Tenure</th>
            <th>Work_Profile</th>
            <th>Mobile</th>
            <th>Remark</th>
           </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5].strftime('%d/%m/%Y') }}</td>
            <td>{{ row[6] }}</td>
            <td>{{ row[7] }}</td>
            <td>{{ row[8] }}</td>
            <td>{{ row[9] }}</td>
            
        </tr>
        {% endfor %}
    </table>
    </div>

    <!-- ✅ YAHAN SCRIPT ADD KARO -->
    <script>
    function editRow(id, name){
        let newName = prompt("Enter new name:", name);

        if(newName){
            fetch("/update_personnel/" + id, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
            },
            body: JSON.stringify({
                field: "Name",
                value: newName
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status == "success"){
                alert("Updated ✅");
                location.reload();
            } else {
                alert("Error ❌");
            }
        });
    }
}
</script>

</body>
</html>

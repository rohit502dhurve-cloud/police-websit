<!DOCTYPE html>
<html>
<head>
<title>View Complaints & Queries</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:20px;
}

h2{
    text-align:center;
    color:navy;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-bottom:40px;
    background:white;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:navy;
    color:white;
}

tr:nth-child(even){
    background:#f9f9f9;
}
</style>

</head>

<body>

<h2>📌 Complaints</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Message</th>
<th>Action</th>
</tr>

{% for c in complaints %}
<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>
  <form action="/delete_form/complaint/{{ c[0] }}" method="POST" style="margin:0;">
    <button type="submit" onclick="return confirm('Are you sure you want to delete this complaint?');" 
    style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">
      Delete
    </button>
  </form>
</td>
</tr>
{% endfor %}
</table>


<h2>📌 Queries</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Message</th>
<th>Action</th>
</tr>

{% for q in queries %}
<tr>
<td>{{q[0]}}</td>
<td>{{q[1]}}</td>
<td>{{q[2]}}</td>
<td>
  <form action="/delete_form/query/{{ q[0] }}" method="POST" style="margin:0;">
    <button type="submit" onclick="return confirm('Are you sure you want to delete this query?');" 
    style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">
      Delete
    </button>
  </form>
</td>
</tr>
{% endfor %}
</table>

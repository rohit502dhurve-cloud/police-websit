<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
    margin-top:100px;
}

form{
    background:white;
    padding:20px;
    display:inline-block;
    box-shadow:0 0 10px gray;
}

input{
    display:block;
    margin:10px auto;
    padding:10px;
    width:200px;
}

button{
    padding:10px 20px;
    background:navy;
    color:white;
    border:none;
}
</style>

</head>

<body>

<h2>Admin Login</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</body>
</html>

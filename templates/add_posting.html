<!DOCTYPE html>
<html>
<head>
    <title>Add Posting</title>
</head>
<body>
    <h2>Add Posting History</h2>

    <form method="POST">
        <input type="text" name="station" placeholder="Posting Station" required><br><br>
        <input type="text" name="outpost" placeholder="Outpost" required><br><br>
        <input type="text" name="rank" placeholder="Rank" required><br><br>
        <input type="date" name="from_date" required><br><br>
        <input type="date" name="to_date"><br><br>

        <button type="submit">Save</button>
    </form>
</body>
</html>

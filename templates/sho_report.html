<!DOCTYPE html>
<html>
<head>
    <title>All Observations Report</title>
</head>
<body>
<h1>All Observations Report</h1>

<form method="get">
    <select name="village">
        <option value="">All Villages</option>
        {% for v in villages %}
            <option value="{{ v }}" {% if v.lower() == selected_village %}selected{% endif %}>{{ v }}</option>
        {% endfor %}
    </select>
    Start Date: <input type="date" name="start_date" value="{{ start_date }}">
    End Date: <input type="date" name="end_date" value="{{ end_date }}">
    <button type="submit">Filter</button>
</form>

<table border="1" style="margin-top:20px;">
    <tr>
        <th>Village</th>
        <th>Observation</th>
        <th>Submitted By</th>
        <th>Date</th>
    </tr>
    {% for o in observations %}
    <tr>
        <td>{{ o[0] }}</td>
        <td>{{ o[1] }}</td>
        <td>{{ o[2] }}</td>
        <td>{{ o[3] }}</td>
    </tr>
    {% endfor %}
</table>
</body>
</html>

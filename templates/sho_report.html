{% extends "base.html" %}

{% block content %}
<h2>All Observations Report</h2>

<form method="get">
    <label>Village:</label>
    <select name="village">
        <option value="">All</option>
        {% for v in villages %}
            <option value="{{ v }}" {% if selected_village==v.lower() %}selected{% endif %}>{{ v }}</option>
        {% endfor %}
    </select>

    <label>Start Date:</label>
    <input type="date" name="start_date" value="{{ start_date }}">

    <label>End Date:</label>
    <input type="date" name="end_date" value="{{ end_date }}">

    <button type="submit">Filter</button>
</form>

<table border="1" cellpadding="5">
    <thead>
        <tr>
            <th>Village</th>
            <th>Observation</th>
            <th>Submitted By</th>
            <th>Date & Time</th>
        </tr>
    </thead>
    <tbody>
        {% for obs in observations %}
        <tr>
            <td>{{ obs[0] }}</td>
            <td>{{ obs[1] }}</td>
            <td>{{ obs[2] }}</td>
            <td>{{ obs[3] }}</td>
        </tr>
        {% endfor %}
        {% if observations|length == 0 %}
        <tr><td colspan="4">No observations found.</td></tr>
        {% endif %}
    </tbody>
</table>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>All Observations Report</title>
    <!-- Bootstrap CDN for better styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">
    <h1 class="text-center mb-4">All Observations Report</h1>
    <div class="d-flex justify-content-between mb-3">
    <a href="/logout" class="btn btn-danger">🚪 Logout</a>
</div>

    <form method="get" class="row g-3 mb-4">
        <!-- Village Filter -->
        <div class="col-md-3">
            <select name="village" class="form-select">
                <option value="">All Villages</option>
                {% for v in villages %}
                    <option value="{{ v }}" {% if v.lower() == selected_village %}selected{% endif %}>{{ v }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Start Date -->
        <div class="col-md-3">
            <input type="date" name="start_date" class="form-control" value="{{ start_date }}">
        </div>

        <!-- End Date -->
        <div class="col-md-3">
           <input type="date" name="end_date" class="form-control" value="{{ end_date }}">
        </div>

        <!-- Submit Button -->
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary w-100">Filter</button>
        </div>
    </form>

    <!-- Observations Table -->
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Village</th>
                <th>Observation</th>
                <th>Submitted By</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for o in observations %}
            <tr>
                <td>{{ o[0] }}</td>
                <td>{{ o[1] }}</td>
                <td>{{ o[2] }}</td>
                <td>{{ o[3].strftime("%d/%m/%Y %H:%M:%S") }}</td>
                <td>
                    <button onclick="deleteObservation('{{ o[4] }}')" 
                            class="btn btn-danger btn-sm">
                        Delete
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
function deleteObservation(id){
    if(confirm("Delete sure?")){
        fetch("/delete_observation/" + id, {
            method: "POST"
        })
        .then(res => res.json())
        .then(data => {
            if(data.status == "success"){
                alert("Deleted ✅");
                location.reload();
            } else {
                alert("Error ❌");
            }
        });
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Police Station Lanji</title>

<style>
*{
  box-sizing: border-box;
}

body{
  font-family: Arial;
  margin:0;
  background:#f2f2f2;
}

header{
  text-align:center;
  background:navy;
  color:white;
  padding:20px;
}

nav{
  background:#333;
  padding:10px;
  text-align:center;
}

nav a{
  color:white;
  margin:15px;
  text-decoration:none;
  font-size:18px;
  cursor:pointer;
}

#mottoText{
  text-align:center;
  font-size:22px;
  color:blue;
  margin-top:10px;
}

/* ✅ FIXED LAYOUT */
.main{
  display:flex;
  gap:20px;
  padding:20px;
}

.left{
  flex:2;
  background:white;
  padding:20px;
  text-align:center;
}

.right{
  flex:1;
  background:white;
  padding:20px;
  text-align:center;
}

.slide{display:none;}
.slide.active{display:block;}

.slide img{
  width:200px;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  box-shadow:0 0 10px black;
  width:300px;
  z-index:1000;
}

  width:100%;
  margin:10px
